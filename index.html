<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UFINET | Command Center Pro V7</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        :root {
            --bg-dark: #070b14; --card-bg: #111827; --accent-blue: #0ea5e9;
            --accent-indigo: #6366f1; --text-main: #f8fafc; --text-dim: #94a3b8;
            --border: #1f2937; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; font-size: 13px; }
        
        /* Sidebar */
        aside { width: 260px; background: var(--card-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; }
        .brand { padding: 20px; font-weight: 900; font-size: 1.3rem; color: var(--accent-blue); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
        .nav-menu { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 4px; }
        .nav-item { padding: 10px 15px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: var(--text-dim); font-weight: 600; transition: 0.2s; }
        .nav-item:hover { background: rgba(255,255,255,0.03); color: var(--text-main); }
        .nav-item.active { background: rgba(14, 165, 233, 0.1); color: var(--accent-blue); }
        
        /* Main Area */
        main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 25px; position: relative; }
        header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        
        /* Chart Controls */
        .chart-controls { display: flex; gap: 8px; margin-bottom: 10px; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 6px; }
        .chart-select { background: var(--bg-dark); border: 1px solid var(--border); color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; outline: none; }
        
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 15px; min-height: 400px; display: flex; flex-direction: column; }
        .box-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }
        
        /* Table & Pagination */
        .table-section { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; flex: 1; display: flex; flex-direction: column; }
        .table-container { overflow-x: auto; padding: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid var(--border); color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #e2e8f0; }
        .pagination { display: flex; gap: 10px; padding: 15px; border-top: 1px solid var(--border); align-items: center; justify-content: center; }
        
        /* Video Mosaic */
        #v-mosaic { display: grid; gap: 10px; margin-top: 10px; flex: 1; }
        .layout-4 { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); }
        .layout-6 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }
        .v-slot { background: #000; border-radius: 8px; overflow: hidden; position: relative; border: 1px solid var(--border); aspect-ratio: 16/9; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .v-controls { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 8px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Loader */
        #loader { position: fixed; inset: 0; background: var(--bg-dark); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <h2 style="color: white;">Iniciando Motor V7 Pro</h2>
        <p id="l-progress" style="color: var(--text-dim);">Cargando 11 capas inteligentes...</p>
    </div>

    <aside>
        <div class="brand"><i data-lucide="monitor-dot"></i> UFINET HUB V7</div>
        <div class="nav-menu" id="nav-container"></div>
        <div style="padding: 15px; border-top: 1px solid var(--border);">
            <select id="master-pais" class="chart-select" style="width:100%; height:35px;">
                <option value="all">🌐 Todos los Países</option>
            </select>
        </div>
    </aside>

    <main>
        <header>
            <div>
                <h1 id="m-title">Cargando...</h1>
                <p id="m-desc" style="color: var(--text-dim);"></p>
            </div>
            <div id="m-kpis" style="display:flex; gap:15px;"></div>
        </header>

        <div id="canvas"></div>
    </main>

    <script>
        // 1. CONFIGURACIÓN DATA LAKE (Manteniendo enlaces originales) [cite: 75, 77]
        const BI_LINKS = {
            proyectos: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh_YcRBFpuU0d6XKvOdYbm4psuN29jy0izAatv-FTKnCOdFxsTX9KeTZEtjFLx4A/pub?gid=388285023&single=true&output=csv',
            towering: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh_YcRBFpuU0d6XKvOdYbm4psuN29jy0izAatv-FTKnCOdFxsTX9KeTZEtjFLx4A/pub?gid=2042842470&single=true&output=csv',
            inventario: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh_YcRBFpuU0d6XKvOdYbm4psuN29jy0izAatv-FTKnCOdFxsTX9KeTZEtjFLx4A/pub?gid=289489994&single=true&output=csv',
            ingenieria: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh_YcRBFpuU0d6XKvOdYbm4psuN29jy0izAatv-FTKnCOdFxsTX9KeTZEtjFLx4A/pub?gid=415493810&single=true&output=csv',
            ventas: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh_YcRBFpuU0d6XKvOdYbm4psuN29jy0izAatv-FTKnCOdFxsTX9KeTZEtjFLx4A/pub?gid=985504155&single=true&output=csv',
            video_inv: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh_YcRBFpuU0d6XKvOdYbm4psuN29jy0izAatv-FTKnCOdFxsTX9KeTZEtjFLx4A/pub?gid=31919447&single=true&output=csv',
            grilla: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh_YcRBFpuU0d6XKvOdYbm4psuN29jy0izAatv-FTKnCOdFxsTX9KeTZEtjFLx4A/pub?gid=1389725164&single=true&output=csv',
            mejoras: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh_YcRBFpuU0d6XKvOdYbm4psuN29jy0izAatv-FTKnCOdFxsTX9KeTZEtjFLx4A/pub?gid=971909457&single=true&output=csv',
            objetivos: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh_YcRBFpuU0d6XKvOdYbm4psuN29jy0izAatv-FTKnCOdFxsTX9KeTZEtjFLx4A/pub?gid=499401589&single=true&output=csv',
            etapas: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh_YcRBFpuU0d6XKvOdYbm4psuN29jy0izAatv-FTKnCOdFxsTX9KeTZEtjFLx4A/pub?gid=264739146&single=true&output=csv',
            guia: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh_YcRBFpuU0d6XKvOdYbm4psuN29jy0izAatv-FTKnCOdFxsTX9KeTZEtjFLx4A/pub?gid=1092874683&single=true&output=csv'
        };

        const MODS = [
            { id: 'proyectos', name: 'Proyectos', icon: 'hard-hat' },
            { id: 'ventas', name: 'Ventas', icon: 'dollar-sign' },
            { id: 'objetivos', name: 'Objetivos', icon: 'target' },
            { id: 'grilla', name: 'Grilla & Mosaico', icon: 'tv' },
            { id: 'ingenieria', name: 'Ingeniería', icon: 'cpu' },
            { id: 'inventario', name: 'Inventario Red', icon: 'server' },
            { id: 'towering', name: 'Towering', icon: 'radio-tower' },
            { id: 'video_inv', name: 'Inv. Video', icon: 'monitor' },
            { id: 'mejoras', name: 'Mejoras', icon: 'trending-up' }
        ];

        let store = {};
        let activeMod = 'proyectos';
        let page = 0;
        let vLayout = 6;
        let hlsPlayers = [];

        // 2. SMART CLEANER: Detecta encabezados reales [cite: 93, 95]
        async function loadAll() {
            const keys = Object.keys(BI_LINKS);
            for(let k of keys) {
                try {
                    const r = await fetch(BI_LINKS[k]);
                    const text = await r.text();
                    const lines = text.split('\n');
                    let start = 0;
                    for(let i=0; i<15; i++) {
                        if(lines[i].split(',').filter(x => x.length > 2).length > 4) { start = i; break; }
                    }
                    const clean = lines.slice(start).join('\n');
                    store[k] = Papa.parse(clean, { header: true, skipEmptyLines: true }).data;
                } catch(e) { store[k] = []; }
                document.getElementById('l-progress').innerText = `Cargado: ${k}...`;
            }
            document.getElementById('loader').style.display = 'none';
            initUI();
        }

        function initUI() {
            const nav = document.getElementById('nav-container');
            MODS.forEach(m => {
                const d = document.createElement('div');
                d.className = `nav-item ${m.id === activeMod ? 'active' : ''}`;
                d.innerHTML = `<i data-lucide="${m.icon}" size="18"></i> ${m.name}`;
                d.onclick = () => { activeMod = m.id; page = 0; render(); };
                nav.appendChild(d);
            });
            
            const paises = [...new Set(store.proyectos.map(x => x.Pais || x.PAIS).filter(Boolean))].sort();
            paises.forEach(p => document.getElementById('master-pais').innerHTML += `<option value="${p}">${p}</option>`);
            document.getElementById('master-pais').onchange = render;
            
            render();
        }

        function getFiltered() {
            const p = document.getElementById('master-pais').value;
            let data = store[activeMod] || [];
            if(p !== 'all') data = data.filter(x => (x.Pais || x.PAIS || x.Country) === p);
            return data;
        }

        function render() {
            const data = getFiltered();
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const mData = MODS.find(x => x.id === activeMod);
            document.getElementById('m-title').innerText = mData.name;
            
            hlsPlayers.forEach(p => p.destroy());
            hlsPlayers = [];

            if(activeMod === 'grilla') renderGrilla(data);
            else renderDashboard(data);
            
            lucide.createIcons();
        }

        // 3. DASHBOARD CON GRÁFICAS CONFIGURABLES 
        function renderDashboard(data) {
            const canvas = document.getElementById('canvas');
            canvas.innerHTML = `
                <div class="grid-layout">
                    <div class="box" id="box-1"></div>
                    <div class="box" id="box-2"></div>
                </div>
                <div class="table-section" id="t-section"></div>
            `;
            
            setupChartBox('box-1', data, 0);
            setupChartBox('box-2', data, 1);
            setupTable(data);
        }

        function setupChartBox(boxId, data, index) {
            const cols = Object.keys(data[0] || {}).filter(c => !c.toLowerCase().includes('id'));
            const box = document.getElementById(boxId);
            box.innerHTML = `
                <div class="chart-controls">
                    <select class="chart-select" id="type-${boxId}" onchange="updateChart('${boxId}')">
                        <option value="bar">Barras</option>
                        <option value="line">Líneas</option>
                        <option value="pie">Pastel</option>
                    </select>
                    <select class="chart-select" id="met-${boxId}" onchange="updateChart('${boxId}')">
                        ${cols.map(c => `<option value="${c}" ${cols[index]===c?'selected':''}>${c}</option>`).join('')}
                    </select>
                </div>
                <div id="plt-${boxId}" style="flex:1"></div>
            `;
            updateChart(boxId);
        }

        window.updateChart = (boxId) => {
            const data = getFiltered();
            const type = document.getElementById(`type-${boxId}`).value;
            const met = document.getElementById(`met-${boxId}`).value;
            const target = `plt-${boxId}`;
            
            const counts = {};
            data.forEach(r => { let v = r[met] || 'N/A'; counts[v] = (counts[v] || 0) + 1; });
            
            const labels = Object.keys(counts).slice(0, 15);
            const values = Object.values(counts).slice(0, 15);

            const trace = {
                x: type === 'pie' ? null : labels,
                y: type === 'pie' ? null : values,
                labels: type === 'pie' ? labels : null,
                values: type === 'pie' ? values : null,
                type: type,
                hole: type === 'pie' ? 0.4 : 0,
                marker: { color: '#0ea5e9' }
            };

            Plotly.newPlot(target, [trace], {
                paper_bgcolor: 'transparent', plot_bgcolor: 'transparent',
                font: { color: '#94a3b8', size: 10 },
                margin: { t: 10, b: 40, l: 30, r: 10 },
                xaxis: { gridcolor: '#1f2937' }, yaxis: { gridcolor: '#1f2937' }
            }, { displayModeBar: false });
        }

        // 4. GRILLA CON MOSAICO INTERACTIVO (4 o 6) [cite: 57, 82, 91]
        function renderGrilla(data) {
            const canvas = document.getElementById('canvas');
            canvas.innerHTML = `
                <div class="box" style="min-height:auto; margin-bottom:20px;">
                    <div class="chart-controls">
                        <span style="font-weight:700">LAYOUT:</span>
                        <button class="chart-select" onclick="vLayout=4; render();">2x2</button>
                        <button class="chart-select" onclick="vLayout=6; render();">3x2</button>
                        <select id="grilla-cli" class="chart-select" onchange="page=0; render();">
                            <option value="all">Filtrar Cliente</option>
                            ${[...new Set(data.map(x=>x.Marval || x.Cliente))].map(c => `<option value="${c}">${c}</option>`).join('')}
                        </select>
                    </div>
                    <div id="v-mosaic" class="layout-${vLayout}"></div>
                    <div class="pagination" id="v-pag"></div>
                </div>
                <div class="table-section" id="t-section"></div>
            `;

            let streams = data.filter(x => x.Senal_Origen || x.URL_ENDPOINT);
            const cli = document.getElementById('grilla-cli').value;
            if(cli !== 'all') streams = streams.filter(x => (x.Marval || x.Cliente) === cli);
            
            const start = page * vLayout;
            const current = streams.slice(start, start + vLayout);
            
            const mos = document.getElementById('v-mosaic');
            current.forEach((s, i) => {
                const id = `vid-${i}`;
                mos.innerHTML += `
                    <div class="v-slot">
                        <video id="${id}" muted autoplay playsinline></video>
                        <div class="v-controls">
                            <span style="font-size:10px; font-weight:700">${s.Canal || 'Live'}</span>
                            <button class="chart-select" onclick="toggleAud('${id}')">🔊</button>
                        </div>
                    </div>
                `;
                setTimeout(() => {
                    const v = document.getElementById(id);
                    if(Hls.isSupported()){
                        const h = new Hls(); h.loadSource(s.Senal_Origen || s.URL_ENDPOINT); h.attachMedia(v); hlsPlayers.push(h);
                    }
                }, 100);
            });

            document.getElementById('v-pag').innerHTML = `
                <button class="chart-select" onclick="page--; render();" ${page===0?'disabled':''}>Anterior</button>
                <span>Pág ${page+1}</span>
                <button class="chart-select" onclick="page++; render();" ${(page+1)*vLayout >= streams.length?'disabled':''}>Siguiente</button>
            `;
            setupTable(data);
        }

        window.toggleAud = (id) => {
            const v = document.getElementById(id);
            v.muted = !v.muted;
        };

        // 5. TABLA PAGINADA UNIVERSAL 
        function setupTable(data) {
            const container = document.getElementById('t-section');
            const cols = Object.keys(data[0] || {}).slice(0, 10);
            const start = page * 50;
            const rows = data.slice(start, start + 50);

            container.innerHTML = `
                <div class="table-container">
                    <table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
                    <tbody>${rows.map(r => `<tr>${cols.map(c=>`<td>${r[c]||'-'}</td>`).join('')}</tr>`).join('')}</tbody></table>
                </div>
                <div class="pagination">
                    <button class="chart-select" onclick="page--; render();" ${page===0?'disabled':''}>Anterior</button>
                    <span>${data.length} registros | Página ${page+1}</span>
                    <button class="chart-select" onclick="page++; render();" ${(page+1)*50 >= data.length?'disabled':''}>Siguiente</button>
                </div>
            `;
        }

        window.onload = loadAll;
    </script>
</body>
</html>
