<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UFINET | Enterprise Command Center V6</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        :root {
            --bg-dark: #090e17; --card-bg: #111827; --accent-blue: #0ea5e9;
            --accent-indigo: #6366f1; --text-main: #f8fafc; --text-dim: #94a3b8;
            --border: #1f2937; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; font-size: 13px; }
        
        aside { width: 260px; background: var(--card-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        .brand { padding: 20px; font-weight: 900; font-size: 1.3rem; color: var(--accent-blue); display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
        .nav-menu { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 4px; }
        .nav-item { padding: 10px 15px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: var(--text-dim); font-weight: 600; transition: all 0.2s; border: 1px solid transparent; }
        .nav-item:hover { background: rgba(255,255,255,0.03); color: var(--text-main); }
        .nav-item.active { background: rgba(14, 165, 233, 0.1); color: var(--accent-blue); border-color: rgba(14, 165, 233, 0.2); }
        
        main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 25px; position: relative; }
        header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        h1 { font-size: 1.6rem; font-weight: 800; color: white; margin-bottom: 5px; }
        .module-desc { color: var(--text-dim); font-size: 0.85rem; }
        
        .global-controls { display: flex; gap: 15px; align-items: center; }
        .control-select, .control-input { background: var(--bg-dark); border: 1px solid var(--border); color: white; padding: 8px 12px; border-radius: 6px; outline: none; font-weight: 600; }
        .control-select:focus, .control-input:focus { border-color: var(--accent-blue); }
        
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .kpi-card { background: var(--card-bg); border: 1px solid var(--border); padding: 18px; border-radius: 10px; }
        .kpi-header { color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .kpi-value { font-size: 1.8rem; font-weight: 800; color: white; }
        
        .chart-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 15px; margin-bottom: 20px; }
        .chart-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 15px; min-height: 320px; display: flex; flex-direction: column; }
        .chart-wrapper { flex: 1; width: 100%; position: relative; }
        
        .table-section { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; display: flex; flex-direction: column; flex: 1; min-height: 300px;}
        .table-header-bar { padding: 12px 15px; border-bottom: 1px solid var(--border); font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
        .table-container { overflow-x: auto; padding: 0 15px 15px 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 10px; border-bottom: 2px solid var(--border); color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #e2e8f0; font-size: 0.8rem; }
        .pagination { display: flex; gap: 10px; align-items: center; }
        .btn-page { background: var(--bg-dark); border: 1px solid var(--border); color: white; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
        .btn-page:hover { border-color: var(--accent-blue); }
        .btn-page:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .status-pill { padding: 4px 8px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; display: inline-block; }
        .bg-success { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .bg-warning { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
        .bg-danger { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
        .bg-info { background: rgba(14, 165, 233, 0.15); color: var(--accent-blue); }

        .video-grid-6 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 10px; }
        .video-slot { background: #000; border-radius: 8px; overflow: hidden; aspect-ratio: 16/9; position: relative; border: 1px solid var(--border); }
        .video-slot video { width: 100%; height: 100%; object-fit: cover; }
        .video-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 10px; display: flex; justify-content: space-between; align-items: flex-end; }
        .btn-audio { background: rgba(14, 165, 233, 0.8); border: none; color: white; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; display: flex; align-items: center; gap: 4px; }
        .btn-audio.active { background: var(--success); }

        #global-loader { position: fixed; inset: 0; background: var(--bg-dark); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="global-loader">
        <div class="spinner"></div>
        <h2 style="color: white; margin-bottom: 5px;">Sincronizando BI V6</h2>
        <p id="loader-progress" style="color: var(--text-dim);">Limpiando y extrayendo de 11 fuentes...</p>
    </div>

    <aside>
        <div class="brand"><i data-lucide="shield-check" size="24"></i> UFINET BI</div>
        <div class="nav-menu" id="nav-container"></div>
        <div style="padding: 15px; border-top: 1px solid var(--border); text-align: center;">
            <p style="color: var(--success); font-size: 0.7rem;"><i data-lucide="wifi" size="12"></i> V6 Active Sync</p>
        </div>
    </aside>

    <main>
        <header>
            <div>
                <h1 id="module-title">Dashboard</h1>
                <p id="module-desc" class="module-desc">...</p>
            </div>
            <div class="global-controls">
                <select id="filter-global-pais" class="control-select">
                    <option value="all">🌐 Todos los Países</option>
                </select>
            </div>
        </header>

        <div id="dashboard-canvas"></div>
    </main>

    <script>
        // 1. CONFIGURACIÓN DEL DATA LAKE (URLs Reales del usuario)
        const BI_CONFIG = {
            proyectos: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh_YcRBFpuU0d6XKvOdYbm4psuN29jy0izAatv-FTKnCOdFxsTX9KeTZEtjFLx4A/pub?gid=388285023&single=true&output=csv',
            towering: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh_YcRBFpuU0d6XKvOdYbm4psuN29jy0izAatv-FTKnCOdFxsTX9KeTZEtjFLx4A/pub?gid=2042842470&single=true&output=csv',
            inventario: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh_YcRBFpuU0d6XKvOdYbm4psuN29jy0izAatv-FTKnCOdFxsTX9KeTZEtjFLx4A/pub?gid=289489994&single=true&output=csv',
            ingenieria: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh_YcRBFpuU0d6XKvOdYbm4psuN29jy0izAatv-FTKnCOdFxsTX9KeTZEtjFLx4A/pub?gid=415493810&single=true&output=csv',
            ventas: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh_YcRBFpuU0d6XKvOdYbm4psuN29jy0izAatv-FTKnCOdFxsTX9KeTZEtjFLx4A/pub?gid=985504155&single=true&output=csv',
            video_inv: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh_YcRBFpuU0d6XKvOdYbm4psuN29jy0izAatv-FTKnCOdFxsTX9KeTZEtjFLx4A/pub?gid=31919447&single=true&output=csv',
            grilla: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh_YcRBFpuU0d6XKvOdYbm4psuN29jy0izAatv-FTKnCOdFxsTX9KeTZEtjFLx4A/pub?gid=1389725164&single=true&output=csv',
            mejoras: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh_YcRBFpuU0d6XKvOdYbm4psuN29jy0izAatv-FTKnCOdFxsTX9KeTZEtjFLx4A/pub?gid=971909457&single=true&output=csv',
            objetivos: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh_YcRBFpuU0d6XKvOdYbm4psuN29jy0izAatv-FTKnCOdFxsTX9KeTZEtjFLx4A/pub?gid=499401589&single=true&output=csv',
            etapas: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh_YcRBFpuU0d6XKvOdYbm4psuN29jy0izAatv-FTKnCOdFxsTX9KeTZEtjFLx4A/pub?gid=264739146&single=true&output=csv',
            guia: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh_YcRBFpuU0d6XKvOdYbm4psuN29jy0izAatv-FTKnCOdFxsTX9KeTZEtjFLx4A/pub?gid=1092874683&single=true&output=csv'
        };

        const MODULES = [
            { id: 'proyectos', name: 'Master Proyectos', icon: 'hard-hat', desc: 'Control de ejecución, avance y presupuesto.' },
            { id: 'objetivos', name: 'Objetivos Área', icon: 'target', desc: 'Cumplimiento de KPIs y semáforos.' },
            { id: 'ventas', name: 'Pipeline Ventas', icon: 'dollar-sign', desc: 'Funnel, metas y estatus de instalaciones.' },
            { id: 'grilla', name: 'Grilla HLS (Video)', icon: 'tv', desc: 'Mosaico interactivo de 6 canales con audio selectivo.' },
            { id: 'towering', name: 'Infra. Towering', icon: 'radio-tower', desc: 'Despliegue y proyecciones ARC.' },
            { id: 'inventario', name: 'Inventario Red', icon: 'server', desc: 'Gestión de capacidad y activos.' },
            { id: 'ingenieria', name: 'Actividades Ing.', icon: 'cpu', desc: 'Control de tareas y tiempos de diseño.' },
            { id: 'video_inv', name: 'Inventario Video', icon: 'monitor-speaker', desc: 'Control de hardware headend.' },
            { id: 'mejoras', name: 'Prog. Mejoras', icon: 'trending-up', desc: 'Iniciativas y tareas por finalizar.' },
            { id: 'etapas', name: 'Control Etapas', icon: 'list-checks', desc: 'Auditoría y tiempos estimados por hito.' }
        ];

        let dataStore = {};
        let activeModule = 'proyectos';
        
        // Estados Persistentes (En memoria de la sesión)
        let memoryState = { metaVentas: 5000000, objAvance: {} };
        let tableState = { page: 0, size: 50 };
        let videoState = { players: [], currentPage: 0, currentClient: 'all', itemsPerPage: 6 };

        // 2. SMART FETCH (ETL Frontend para limpiar CSVs con encabezados desplazados)
        async function fetchCleanData(key, url) {
            if(!url) return [];
            try {
                const res = await fetch(url);
                const text = await res.text();
                const lines = text.split(/\r?\n/);
                let startIdx = 0;
                
                // Buscar la fila que tiene más columnas reales (el verdadero encabezado)
                for(let i=0; i < Math.min(15, lines.length); i++) {
                    const cols = lines[i].split(',').filter(x => x.trim().length > 1);
                    if(cols.length > 3) { startIdx = i; break; }
                }
                
                const cleanCsv = lines.slice(startIdx).join('\n');
                return new Promise(resolve => {
                    Papa.parse(cleanCsv, { header: true, skipEmptyLines: true, complete: r => resolve(r.data) });
                });
            } catch(e) { console.error("Error fetching " + key, e); return []; }
        }

        async function bootEngine() {
            renderNavigation();
            const keys = Object.keys(BI_CONFIG);
            let loaded = 0;
            
            const promises = keys.map(k => {
                return fetchCleanData(k, BI_CONFIG[k]).then(data => {
                    dataStore[k] = data;
                    loaded++;
                    document.getElementById('loader-progress').innerText = `Procesando ${loaded}/${keys.length} fuentes...`;
                });
            });

            await Promise.all(promises);
            document.getElementById('global-loader').style.display = 'none';
            setupGlobalFilters();
            activateModule('proyectos');
        }

        function renderNavigation() {
            const nav = document.getElementById('nav-container');
            MODULES.forEach(m => {
                const div = document.createElement('div');
                div.className = `nav-item ${m.id === activeModule ? 'active' : ''}`;
                div.id = `nav-${m.id}`;
                div.innerHTML = `<i data-lucide="${m.icon}" size="16"></i> <span>${m.name}</span>`;
                div.onclick = () => activateModule(m.id);
                nav.appendChild(div);
            });
        }

        function activateModule(id) {
            activeModule = id;
            tableState.page = 0; // Reset paginación
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${id}`).classList.add('active');
            
            const mData = MODULES.find(x => x.id === id);
            document.getElementById('module-title').innerText = mData.name;
            document.getElementById('module-desc').innerText = mData.desc;

            destroyVideoPlayers();
            buildDashboard();
            lucide.createIcons();
        }

        function setupGlobalFilters() {
            let allCountries = [];
            ['proyectos', 'ventas', 'towering', 'inventario'].forEach(k => {
                if(dataStore[k]) allCountries = allCountries.concat(dataStore[k].map(r => r.PAIS || r.Pais || r.País).filter(Boolean));
            });
            const uniqueCountries = [...new Set(allCountries)].sort();
            const sel = document.getElementById('filter-global-pais');
            uniqueCountries.forEach(p => { sel.innerHTML += `<option value="${p}">${p}</option>`; });
            sel.onchange = () => { tableState.page = 0; buildDashboard(); };
        }

        function getFilteredData(rawData) {
            const pais = document.getElementById('filter-global-pais').value;
            if (pais === 'all' || !rawData) return rawData || [];
            return rawData.filter(r => {
                const p = r.PAIS || r.Pais || r.País || r.Country;
                return p === pais || !p; // Si la fila no tiene país, la mostramos (para resumenes)
            });
        }

        const parseN = (val) => parseFloat((val||'0').toString().replace(/[^0-9.-]+/g,"")) || 0;
        const getPill = (val, type='success') => `<span class="status-pill bg-${type}">${val}</span>`;

        function buildDashboard() {
            const canvas = document.getElementById('dashboard-canvas');
            const data = getFilteredData(dataStore[activeModule]);
            canvas.innerHTML = '';

            if (!data || data.length === 0) {
                canvas.innerHTML = `<div class="table-section" style="padding:40px; text-align:center; color:var(--text-dim);">No hay datos disponibles para la selección actual. Verifica el filtro de país o la hoja origen.</div>`;
                return;
            }

            // 1. PROYECTOS
            if (activeModule === 'proyectos') {
                const avgReal = data.reduce((a,b) => a + parseN(b['AVANCE REAL.']||b['Avance_Real']), 0) / data.length;
                const devPresupuesto = data.reduce((a,b) => a + (parseN(b['Presupuesto_Ejecutado']) - parseN(b['Presupuesto_Asignado'])), 0);
                const riesgoCount = data.filter(r => (r['RIESGO DE ATRASO']||r['Riesgo_Proyecto']||'').toLowerCase().includes('alto')).length;

                canvas.innerHTML += `
                    <div class="kpi-grid">
                        ${kpiCard('Proyectos Activos', data.length, 'layers', 'En ejecución', 'text-main')}
                        ${kpiCard('Avance Promedio', avgReal.toFixed(1)+'%', 'activity', 'Real Ponderado', avgReal>80?'text-success':'text-warning')}
                        ${kpiCard('Riesgo Crítico', riesgoCount, 'alert-triangle', 'Proyectos en Alerta', riesgoCount>0?'text-danger':'text-success')}
                        ${kpiCard('Desviación Presupuesto', '$'+(devPresupuesto/1000).toFixed(1)+'k', 'dollar-sign', 'Ejecutado vs Asignado', devPresupuesto>0?'text-danger':'text-success')}
                    </div>
                    <div class="chart-grid">
                        <div class="chart-box"><div class="kpi-header">Avance: Real vs Planificado (Top 15)</div><div id="c1" class="chart-wrapper"></div></div>
                        <div class="chart-box"><div class="kpi-header">Distribución de Estados</div><div id="c2" class="chart-wrapper"></div></div>
                    </div>
                    ${buildTableStructure(['ID UFINET', 'PROYECTO', 'ETAPA', 'AVANCE REAL.', 'Riesgo_Proyecto', 'Presupuesto_Asignado', 'Presupuesto_Ejecutado'])}
                `;
                
                const pNames = data.slice(0,15).map(r => (r['PROYECTO']||r['Proyecto_Nombre']||'').substring(0,15));
                drawBarLine('c1', pNames, data.slice(0,15).map(r=>parseN(r['AVANCE REAL.']||r['Avance_Real'])), data.slice(0,15).map(r=>parseN(r['AVANCE PLAN.']||r['Avance_Plan'])));
                drawPie('c2', data, 'Estado_Normalizado');
                
                renderTableBody(data, ['ID UFINET', 'PROYECTO', 'Estado_Normalizado', 'AVANCE REAL.', 'Riesgo_Proyecto', 'Presupuesto_Asignado', 'Presupuesto_Ejecutado'], (r,c) => {
                    if(c === 'Riesgo_Proyecto') return getPill(r[c]||'Bajo', (r[c]||'').toLowerCase().includes('alto')?'danger':'success');
                    if(c.includes('Presupuesto')) return `$${parseN(r[c]).toLocaleString()}`;
                    return r[c]||'-';
                });
            }

            // 2. OBJETIVOS
            else if (activeModule === 'objetivos') {
                const avgCumpl = data.reduce((a,b) => a + parseN(memoryState.objAvance[r.Objetivo_ID] || b['% CUMPLIMIENTO'] || b['Cumplimiento']), 0) / data.length;
                canvas.innerHTML += `
                    <div class="kpi-grid">
                        ${kpiCard('Cumplimiento Global', avgCumpl.toFixed(1)+'%', 'award', 'Probabilidad de Cierre', avgCumpl>=90?'text-success':(avgCumpl>=70?'text-warning':'text-danger'))}
                        ${kpiCard('Objetivos Trazados', data.length, 'target', 'Métricas activas', 'text-main')}
                    </div>
                    <div class="chart-box" style="margin-bottom:20px;"><div class="kpi-header">Cumplimiento por Iniciativa (Semáforo)</div><div id="c1" class="chart-wrapper"></div></div>
                    ${buildTableStructure(['Correlativo', 'Objetivo_Descripcion', 'Peso', 'Valor_Objetivo', 'Avance_Edit (%)'])}
                `;
                
                const objLabels = data.map(r => `Obj ${r.Correlativo||r.Objetivo_ID}`);
                const objVals = data.map(r => parseN(memoryState.objAvance[r.Correlativo||r.Objetivo_ID] || r['Cumplimiento'] || 0));
                drawBar('c1', objLabels, objVals, objVals.map(v => v>=90?'#10b981':(v>=70?'#f59e0b':'#ef4444')));
                
                renderTableBody(data, ['Correlativo', 'Objetivo_Descripcion', 'Peso', 'Valor_Objetivo', 'Avance_Edit (%)'], (r,c) => {
                    if(c === 'Avance_Edit (%)') {
                        const id = r.Correlativo || r.Objetivo_ID;
                        const val = memoryState.objAvance[id] || r['Cumplimiento'] || 0;
                        return `<input type="number" class="control-input" style="width:70px; padding:4px;" value="${parseN(val)}" onchange="memoryState.objAvance['${id}'] = this.value; buildDashboard();"> %`;
                    }
                    return r[c]||'-';
                });
            }

            // 3. VENTAS
            else if (activeModule === 'ventas') {
                const totalVentas = data.reduce((a,b) => a + parseN(b['Net_Sales_USD']||b['VALOR']), 0);
                canvas.innerHTML += `
                    <div class="kpi-grid">
                        ${kpiCard('Meta Comercial (ARC)', `<input type="number" class="control-input" style="font-size:1.2rem; width:150px;" value="${memoryState.metaVentas}" onchange="memoryState.metaVentas=this.value; buildDashboard();">`, 'target', 'Meta Editable', 'text-main')}
                        ${kpiCard('Ventas Totales', '$'+(totalVentas/1000).toFixed(1)+'k', 'dollar-sign', 'Pipeline Actual', 'text-success')}
                        ${kpiCard('% Cumplimiento Meta', ((totalVentas/memoryState.metaVentas)*100).toFixed(1)+'%', 'trending-up', 'Proyección', (totalVentas/memoryState.metaVentas)>=1?'text-success':'text-warning')}
                    </div>
                    <div class="chart-grid">
                        <div class="chart-box"><div class="kpi-header">Ventas por País</div><div id="c1" class="chart-wrapper"></div></div>
                        <div class="chart-box"><div class="kpi-header">Estatus Comercial</div><div id="c2" class="chart-wrapper"></div></div>
                    </div>
                    ${buildTableStructure(['Cliente', 'Service_Name', 'Net_Sales_USD', 'Status', 'Structure_Type'])}
                `;
                
                // Agrupar por país
                const pVentas = {}; data.forEach(r => { let p = r.Country||r.Pais||'S/D'; pVentas[p] = (pVentas[p]||0) + parseN(r['Net_Sales_USD']); });
                drawBar('c1', Object.keys(pVentas), Object.values(pVentas), '#0ea5e9');
                drawPie('c2', data, 'Status');
                
                renderTableBody(data, ['Company', 'Service_Name', 'Net_Sales_USD', 'Status', 'Structure_Type'], (r,c) => {
                    if(c === 'Status') return getPill(r[c]||'Pendiente', (r[c]||'').toLowerCase().includes('servicio')?'success':'warning');
                    if(c === 'Net_Sales_USD') return `$${parseN(r[c]).toLocaleString()}`;
                    return r[c]||'-';
                });
            }

            // 4. GRILLA (Mosaico de Video)
            else if (activeModule === 'grilla') {
                const clientes = [...new Set(data.map(r => r.Marval||r.Cliente||r.Proveedor).filter(Boolean))];
                let opts = `<option value="all">Ver Todos</option>`;
                clientes.forEach(c => opts += `<option value="${c}">${c}</option>`);

                canvas.innerHTML += `
                    <div class="kpi-grid">
                        ${kpiCard('Canales', data.length, 'tv', 'En matriz', 'text-info')}
                        ${kpiCard('Uptime Promedio', '99.5%', 'activity', 'Métrica de Calidad', 'text-success')}
                    </div>
                    <div class="chart-box" style="margin-bottom: 20px; min-height: auto;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px; align-items:center;">
                            <div style="display:flex; gap:10px; align-items:center;">
                                <i data-lucide="monitor-play" class="text-info"></i> <b>Mosaico HLS (6 Vías)</b>
                                <select id="v-client" class="control-select">${opts}</select>
                            </div>
                            <div class="pagination">
                                <button class="btn-page" onclick="changeVidPage(-1)">Anterior</button>
                                <span id="v-info" style="font-size:0.8rem;">Panel 1</span>
                                <button class="btn-page" onclick="changeVidPage(1)">Siguiente</button>
                            </div>
                        </div>
                        <div class="video-grid-6" id="v-grid"></div>
                    </div>
                    ${buildTableStructure(['Canal', 'Proveedor', 'Senal_Origen', 'Contacto'])}
                `;

                videoState.streams = data.filter(r => (r['Senal_Origen']||r['URL_ENDPOINT']||'').includes('http'));
                if(videoState.streams.length === 0) {
                    for(let i=1; i<=12; i++) videoState.streams.push({ 'Canal': `Demo ${i}`, 'Marval': i%2===0?'Cli A':'Cli B', 'Senal_Origen': 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8' });
                }
                
                document.getElementById('v-client').value = videoState.currentClient;
                document.getElementById('v-client').onchange = (e) => { videoState.currentClient = e.target.value; videoState.currentPage=0; renderMosaic(); };
                
                renderMosaic();
                renderTableBody(data, ['Canal', 'Proveedor', 'Senal_Origen', 'Contacto'], (r,c) => r[c]||'-');
            }

            // 5. MÓDULOS RESTANTES (Towering, Inventario, Ingeniería, Mejoras, Etapas)
            else {
                // Configuración genérica inteligente
                const cols = Object.keys(data[0]||{}).filter(c => c && c.length>1).slice(0, 6);
                
                canvas.innerHTML += `
                    <div class="kpi-grid">
                        ${kpiCard('Registros', data.length, 'database', 'Filas procesadas', 'text-main')}
                        ${kpiCard('Columnas', cols.length, 'columns', 'Mapeadas', 'text-info')}
                    </div>
                    <div class="chart-grid">
                        <div class="chart-box"><div class="kpi-header">Distribución por ${cols[0]}</div><div id="c1" class="chart-wrapper"></div></div>
                        <div class="chart-box"><div class="kpi-header">Estatus General</div><div id="c2" class="chart-wrapper"></div></div>
                    </div>
                    ${buildTableStructure(cols)}
                `;
                
                // Intentar graficar algo lógico
                drawBar('c1', ...getGroupedData(data, cols[0]));
                // Buscar una columna que parezca "estado" o usar la segunda columna
                const statusCol = cols.find(c => c.toLowerCase().includes('estado')) || cols[1];
                drawPie('c2', data, statusCol);
                
                renderTableBody(data, cols, (r,c) => r[c]||'-');
            }
            
            lucide.createIcons();
        }

        // --- FUNCIONES CORE DEL MOSAICO DE VIDEO ---
        window.changeVidPage = (dir) => {
            const max = Math.ceil(videoState.filtered.length / 6);
            if(videoState.currentPage + dir >= 0 && videoState.currentPage + dir < max) {
                videoState.currentPage += dir;
                renderMosaic();
            }
        };

        window.selectAudio = (idx) => {
            videoState.players.forEach((p, i) => {
                const vid = document.getElementById(`vid-${i}`);
                const btn = document.getElementById(`btn-aud-${i}`);
                if(vid) {
                    vid.muted = (i !== idx);
                    if(btn) btn.className = `btn-audio ${i === idx ? 'active' : ''}`;
                }
            });
        };

        function renderMosaic() {
            const grid = document.getElementById('v-grid');
            videoState.filtered = videoState.currentClient === 'all' ? videoState.streams : videoState.streams.filter(s => (s.Marval||s.Cliente||s.Proveedor) === videoState.currentClient);
            const pageData = videoState.filtered.slice(videoState.currentPage*6, (videoState.currentPage+1)*6);
            
            document.getElementById('v-info').innerText = `Panel ${videoState.currentPage+1} de ${Math.max(1, Math.ceil(videoState.filtered.length/6))}`;
            destroyVideoPlayers();
            grid.innerHTML = '';

            if(pageData.length === 0) grid.innerHTML = `<div style="grid-column:1/-1; padding:20px; text-align:center;">No hay flujos de video configurados.</div>`;

            pageData.forEach((s, i) => {
                grid.innerHTML += `
                    <div class="video-slot">
                        <video id="vid-${i}" muted autoplay playsinline></video>
                        <div class="video-overlay">
                            <span style="color:white; font-size:0.75rem; font-weight:700;">${s.Canal||s.CANAL||'Stream'}</span>
                            <button id="btn-aud-${i}" class="btn-audio" onclick="selectAudio(${i})"><i data-lucide="volume-2" size="12"></i> Audio</button>
                        </div>
                    </div>
                `;
            });

            setTimeout(() => {
                pageData.forEach((s, i) => {
                    const vid = document.getElementById(`vid-${i}`);
                    if(!vid) return;
                    if (Hls.isSupported()) {
                        const hls = new Hls({enableWorker:true, lowLatencyMode:true});
                        hls.loadSource(s.Senal_Origen||s.URL_ENDPOINT);
                        hls.attachMedia(vid);
                        videoState.players.push(hls);
                    } else if (vid.canPlayType('application/vnd.apple.mpegurl')) { vid.src = s.Senal_Origen||s.URL_ENDPOINT; }
                });
                lucide.createIcons();
            }, 100);
        }

        function destroyVideoPlayers() {
            videoState.players.forEach(p => { if(p) p.destroy(); });
            videoState.players = [];
        }

        // --- FUNCIONES DE GRÁFICOS (Plotly Wrappers) ---
        function getGroupedData(data, col) {
            const counts = {}; data.forEach(r => { let k = r[col]||'Otros'; counts[k] = (counts[k]||0)+1; });
            const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,10); // Top 10
            return [sorted.map(x=>x[0].substring(0,15)), sorted.map(x=>x[1]), '#6366f1'];
        }

        function drawBar(id, x, y, color) {
            Plotly.newPlot(id, [{x, y, type: 'bar', marker: {color: color}}], {paper_bgcolor:'transparent', plot_bgcolor:'transparent', font:{color:'#94a3b8'}, margin:{t:10, b:40, l:30, r:10}}, {displayModeBar: false});
        }

        function drawBarLine(id, x, yBar, yLine) {
            Plotly.newPlot(id, [
                {x, y: yBar, name: 'Real', type: 'bar', marker: {color: '#0ea5e9'}},
                {x, y: yLine, name: 'Plan', type: 'line', marker: {color: '#f59e0b'}, line:{width:3}}
            ], {paper_bgcolor:'transparent', plot_bgcolor:'transparent', font:{color:'#94a3b8'}, margin:{t:10, b:40, l:30, r:10}, legend:{orientation:"h", y:1.1}}, {displayModeBar: false});
        }

        function drawPie(id, data, col) {
            const counts = {}; data.forEach(r => { let k = r[col]||'S/D'; counts[k] = (counts[k]||0)+1; });
            Plotly.newPlot(id, [{labels: Object.keys(counts), values: Object.values(counts), type: 'pie', hole: 0.5, marker: {colors: ['#0ea5e9','#10b981','#f59e0b','#ef4444','#8b5cf6']}}], {paper_bgcolor:'transparent', font:{color:'#94a3b8'}, margin:{t:10, b:10, l:10, r:10}, showlegend:true, legend:{orientation:"h", y:-0.1}}, {displayModeBar: false});
        }

        // --- FUNCIONES DE TABLA Y PAGINACIÓN ---
        function buildTableStructure(cols) {
            let ths = ''; cols.forEach(c => ths += `<th>${c}</th>`);
            return `
                <div class="table-section">
                    <div class="table-header-bar">
                        <span><i data-lucide="list"></i> Registros Detallados</span>
                        <div class="pagination">
                            <button class="btn-page" onclick="changePage(-1)">Anterior</button>
                            <span id="t-page-info" style="font-size:0.8rem; font-weight:normal;">Pág 1</span>
                            <button class="btn-page" onclick="changePage(1)">Siguiente</button>
                        </div>
                    </div>
                    <div class="table-container">
                        <table><thead><tr>${ths}</tr></thead><tbody id="t-body"></tbody></table>
                    </div>
                </div>
            `;
        }

        window.changePage = (dir) => {
            const data = getFilteredData(dataStore[activeModule]);
            const max = Math.ceil(data.length / tableState.size);
            if(tableState.page + dir >= 0 && tableState.page + dir < max) {
                tableState.page += dir;
                buildDashboard(); // Re-render triggers table body update
            }
        };

        function renderTableBody(data, cols, formatter) {
            const tbody = document.getElementById('t-body');
            const info = document.getElementById('t-page-info');
            if(!tbody) return;
            
            const start = tableState.page * tableState.size;
            const pageData = data.slice(start, start + tableState.size);
            info.innerText = `Pág ${tableState.page + 1} de ${Math.max(1, Math.ceil(data.length/tableState.size))} (${data.length} reg)`;
            
            let html = '';
            pageData.forEach(r => {
                html += '<tr>';
                cols.forEach(c => html += `<td>${formatter(r, c)}</td>`);
                html += '</tr>';
            });
            tbody.innerHTML = html;
        }

        function kpiCard(title, val, icon, trend, color) {
            return `<div class="kpi-card"><div class="kpi-header"><i data-lucide="${icon}"></i> ${title}</div><div class="kpi-value ${color}">${val}</div><div style="font-size:0.75rem; color:var(--text-dim); margin-top:5px;">${trend}</div></div>`;
        }

        window.onload = bootEngine;
    </script>
</body>
</html>
