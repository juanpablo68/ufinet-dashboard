<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UFINET | Command Center Integral</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg-dark: #0f172a; --card-bg: #1e293b; --accent-blue: #0ea5e9;
            --accent-purple: #8b5cf6; --accent-green: #10b981; --accent-orange: #f59e0b;
            --text-main: #f8fafc; --text-dim: #94a3b8; --border: #334155;
            --success: #22c55e; --warning: #eab308; --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Menu */
        aside {
            width: 260px; background: var(--card-bg); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; height: 100%;
        }
        .logo { padding: 20px; font-weight: 800; font-size: 1.2rem; color: var(--accent-blue); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
        
        .menu-list { flex: 1; overflow-y: auto; padding: 15px 10px; display: flex; flex-direction: column; gap: 5px; }
        .menu-item {
            padding: 12px 15px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px;
            color: var(--text-dim); font-size: 0.85rem; font-weight: 600; transition: 0.2s; border: 1px solid transparent;
        }
        .menu-item:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }
        .menu-item.active { background: var(--accent-blue); color: var(--bg-dark); border-color: var(--accent-blue); }
        
        /* Main Workspace */
        main { flex: 1; display: flex; flex-direction: column; height: 100%; overflow-y: auto; padding: 25px 35px; }
        header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 25px; }
        h1 { font-size: 1.8rem; letter-spacing: -0.02em; }
        .subtitle { color: var(--text-dim); font-size: 0.9rem; margin-top: 5px; }
        
        /* Global State Indicators */
        .sync-status { padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--warning); }
        .dot.synced { background: var(--success); }

        /* Widgets & Layout */
        .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 20px; border-radius: 12px; }
        .kpi-title { color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .kpi-value { font-size: 2.2rem; font-weight: 800; line-height: 1; }
        .kpi-sub { font-size: 0.8rem; margin-top: 8px; font-weight: 500; }

        .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .chart-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 15px; min-height: 300px; }
        
        .table-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; overflow-x: auto; grid-column: 1 / -1; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid var(--border); color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        tbody tr:hover { background: rgba(255,255,255,0.02); }

        .pill { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .text-success { color: var(--success); } .text-warning { color: var(--warning); } .text-danger { color: var(--danger); }

        /* Loader Overlay */
        #loader { position: fixed; inset: 0; background: var(--bg-dark); z-index: 50; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Video Grid */
        #video-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .v-slot { background: #000; border-radius: 8px; overflow: hidden; aspect-ratio: 16/9; position: relative; }
        .v-slot video { width: 100%; height: 100%; object-fit: cover; }
        .v-label { position: absolute; bottom: 5px; left: 5px; background: rgba(0,0,0,0.7); font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div style="font-weight: 600; color: var(--text-dim);" id="loader-text">Inicializando Data Hub...</div>
    </div>

    <aside>
        <div class="logo"><i data-lucide="hexagon"></i> UFINET HUB</div>
        <div class="menu-list" id="menu-container">
            </div>
        <div style="padding: 15px; border-top: 1px solid var(--border); font-size: 0.7rem; color: var(--text-dim); text-align: center;">
            Engine V3.0 | Multi-Source
        </div>
    </aside>

    <main>
        <header>
            <div>
                <h1 id="view-title">Dashboard</h1>
                <div class="subtitle" id="view-subtitle">Selecciona un módulo</div>
            </div>
            <div class="sync-status">
                <div class="dot" id="sync-dot"></div> <span id="sync-text">Sincronizando...</span>
            </div>
        </header>

        <section class="kpi-row" id="kpi-container"></section>
        
        <section class="content-grid" id="charts-container"></section>

        <section class="table-box" id="table-container"></section>
    </main>

    <script>
        /** * ==========================================
         * 1. CONFIGURACIÓN DE ENLACES MAESTROS
         * ==========================================
         * Pega aquí los enlaces CSV publicados de cada hoja.
         * Si un enlace está vacío (''), el módulo mostrará datos de Demostración.
         */
        const CONFIG_URLS = {
            construccion: '',   // URL de "Master construcción"
            towering: '',       // URL de "instalaciones Towering"
            inventario: '',     // URL de "Inventario"
            ingenieria: '',     // URL de "Actividades de Ingenieria"
            ventas: '',         // URL de "ventas"
            video_inv: '',      // URL de "Inventario equipo area Video"
            grilla: '',         // URL de "Grilla Canales por cliente"
            mejoras: '',        // URL de "Programa mejoras de area"
            objetivos: ''       // URL de "Objetivos del area"
        };

        /**
         * ==========================================
         * 2. DEFINICIÓN DE MÓDULOS (Data Dictionary)
         * ==========================================
         */
        const MODULES = [
            { id: 'construccion', name: 'Master Construcción', icon: 'hard-hat', desc: 'Control de obras, CAPEX y cronogramas.' },
            { id: 'towering', name: 'Instalaciones Towering', icon: 'radio-tower', desc: 'Despliegue y viabilidad de sitios.' },
            { id: 'inventario', name: 'Inventario Red', icon: 'server', desc: 'Activos, capacidad y estado operativo.' },
            { id: 'ingenieria', name: 'Actividades Ingeniería', icon: 'cpu', desc: 'Tareas, responsables y cuellos de botella.' },
            { id: 'ventas', name: 'Control de Ventas', icon: 'dollar-sign', desc: 'Funnel financiero y estatus de entrega.' },
            { id: 'video_inv', name: 'Inventario Video', icon: 'monitor-speaker', desc: 'Hardware de procesamiento y codificación.' },
            { id: 'grilla', name: 'Grilla Canales', icon: 'tv', desc: 'Disponibilidad HLS y concentración por proveedor.' },
            { id: 'mejoras', name: 'Mejoras de Área', icon: 'trending-up', desc: 'Iniciativas estratégicas y optimización.' },
            { id: 'objetivos', name: 'Objetivos Área', icon: 'target', desc: 'Cumplimiento de metas ejecutivas (KPIs).' }
        ];

        // Estado Global
        const appState = {
            activeModule: 'construccion',
            dataStore: {}, // Almacenará los JSON parseados de cada hoja
            players: []    // Para el módulo de video
        };

        /**
         * ==========================================
         * 3. MOTOR DE CARGA ASÍNCRONA
         * ==========================================
         */
        async function initApp() {
            renderMenu();
            lucide.createIcons();
            
            let loadedCount = 0;
            const total = Object.keys(CONFIG_URLS).length;

            // Cargar todas las fuentes en paralelo
            const fetchPromises = Object.keys(CONFIG_URLS).map(key => {
                return new Promise(resolve => {
                    if (!CONFIG_URLS[key]) {
                        appState.dataStore[key] = generateMockData(key); // Usar Mock si no hay URL
                        loadedCount++;
                        updateLoader(loadedCount, total);
                        resolve();
                    } else {
                        Papa.parse(CONFIG_URLS[key], {
                            download: true, header: true, skipEmptyLines: true,
                            complete: (res) => {
                                appState.dataStore[key] = res.data;
                                loadedCount++;
                                updateLoader(loadedCount, total);
                                resolve();
                            },
                            error: () => {
                                appState.dataStore[key] = []; // Fallback seguro
                                loadedCount++;
                                resolve();
                            }
                        });
                    }
                });
            });

            await Promise.all(fetchPromises);
            
            document.getElementById('loader').style.display = 'none';
            document.getElementById('sync-dot').classList.add('synced');
            document.getElementById('sync-text').innerText = 'Data Sincronizada';
            
            switchModule('construccion'); // Iniciar con el primer módulo
        }

        function updateLoader(current, total) {
            document.getElementById('loader-text').innerText = `Sincronizando ${current}/${total} fuentes de datos...`;
        }

        /**
         * ==========================================
         * 4. RENDERIZADO DE UI
         * ==========================================
         */
        function renderMenu() {
            const container = document.getElementById('menu-container');
            MODULES.forEach(mod => {
                const div = document.createElement('div');
                div.className = `menu-item ${mod.id === appState.activeModule ? 'active' : ''}`;
                div.id = `menu-${mod.id}`;
                div.innerHTML = `<i data-lucide="${mod.icon}"></i> ${mod.name}`;
                div.onclick = () => switchModule(mod.id);
                container.appendChild(div);
            });
        }

        function switchModule(modId) {
            // UI Updates
            appState.activeModule = modId;
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`menu-${modId}`).classList.add('active');
            
            const modInfo = MODULES.find(m => m.id === modId);
            document.getElementById('view-title').innerText = modInfo.name;
            document.getElementById('view-subtitle').innerText = modInfo.desc;

            // Limpieza (destruir videos si salimos de grilla)
            if (modId !== 'grilla') {
                appState.players.forEach(p => p && p.destroy());
                appState.players = [];
            }

            // Renderizar contenido específico
            const data = appState.dataStore[modId];
            document.getElementById('charts-container').innerHTML = ''; // Limpiar charts
            
            if (!data || data.length === 0) {
                document.getElementById('kpi-container').innerHTML = '<div class="card">Datos no encontrados o URL inválida.</div>';
                document.getElementById('table-container').innerHTML = '';
                return;
            }

            renderDynamicModule(modId, data);
            lucide.createIcons();
        }

        /**
         * ==========================================
         * 5. LÓGICA ESPECÍFICA POR MÓDULO
         * ==========================================
         */
        function renderDynamicModule(modId, data) {
            const kpiBox = document.getElementById('kpi-container');
            const chartBox = document.getElementById('charts-container');
            const tableBox = document.getElementById('table-container');

            // --- AYUDANTES DE CÁLCULO ---
            const cleanNum = (val) => parseFloat((val||'0').toString().replace(/[^0-9.-]+/g,"")) || 0;
            const countEq = (key, val) => data.filter(r => r[key] === val).length;

            if (modId === 'construccion') {
                const total = data.length;
                const avgReal = data.reduce((a,b) => a + cleanNum(b['AVANCE REAL.'] || b['Avance']), 0) / total;
                
                kpiBox.innerHTML = `
                    ${buildKPI('Proyectos', total, 'layers', 'text-success', 'Activos')}
                    ${buildKPI('Avance Promedio', avgReal.toFixed(1)+'%', 'activity', avgReal>80?'text-success':'text-warning', 'Real Ponderado')}
                    ${buildKPI('Alertas', data.filter(r => (r['RIESGO']||'').toLowerCase().includes('alto')).length, 'alert-triangle', 'text-danger', 'Riesgo Crítico')}
                `;
                buildChartBox('chart1', 'Estatus de Etapas', chartBox);
                plotBar('chart1', data, 'ETAPA');
                buildTable(data, ['ID UFINET', 'PROYECTO', 'PAIS', 'ETAPA', 'AVANCE REAL.'], tableBox);

            } else if (modId === 'objetivos') {
                const avgCumpl = data.reduce((a,b) => a + cleanNum(b['% CUMPLIMIENTO'] || b['Cumplimiento']), 0) / data.length;
                
                kpiBox.innerHTML = `
                    ${buildKPI('KPIs Activos', data.length, 'target', 'text-main', 'Monitoreados')}
                    ${buildKPI('Cumplimiento Global', avgCumpl.toFixed(1)+'%', 'award', avgCumpl>=100?'text-success':'text-warning', 'Promedio')}
                    ${buildKPI('En Peligro', data.filter(r => cleanNum(r['% CUMPLIMIENTO']) < 80).length, 'trending-down', 'text-danger', '< 80%')}
                `;
                buildChartBox('chart1', 'Cumplimiento por Objetivo', chartBox, true); // Full width
                plotGaugeBar('chart1', data, 'OBJETIVO', '% CUMPLIMIENTO');
                buildTable(data, ['OBJETIVO', 'META', 'REAL', '% CUMPLIMIENTO', 'PESO'], tableBox);

            } else if (modId === 'ventas') {
                const totalVal = data.reduce((a,b) => a + cleanNum(b['VALOR'] || b['Monto']), 0);
                
                kpiBox.innerHTML = `
                    ${buildKPI('Ingresos (Funnel)', '$'+(totalVal/1000).toFixed(1)+'k', 'dollar-sign', 'text-success', 'Valor Total')}
                    ${buildKPI('Cuentas', [...new Set(data.map(r => r['CLIENTE']))].length, 'users', 'text-main', 'Clientes Únicos')}
                    ${buildKPI('Instalaciones Pend.', countEq('ESTADO', 'Pendiente'), 'clock', 'text-warning', 'Por ejecutar')}
                `;
                buildChartBox('chart1', 'Ventas por Estatus', chartBox);
                plotPie('chart1', data, 'ESTADO');
                buildTable(data, ['CLIENTE', 'PRODUCTO', 'VALOR', 'FECHA DE INSTALACION', 'ESTADO'], tableBox);

            } else if (modId === 'grilla') {
                kpiBox.innerHTML = `
                    ${buildKPI('Canales Totales', data.length, 'tv', 'text-main', 'En grilla')}
                    ${buildKPI('Clientes OTT', [...new Set(data.map(r => r['CLIENTE']))].length, 'cast', 'text-success', 'Activos')}
                    ${buildKPI('Disponibilidad', '99.8%', 'check-circle', 'text-success', 'Uptime Promedio')}
                `;
                
                // Modulo de Video Especial
                chartBox.innerHTML = `<div class="chart-box" style="grid-column: 1/-1;"><div class="kpi-title"><i data-lucide="monitor-play"></i> Monitoreo HLS (Mosaico)</div><div id="video-grid"></div></div>`;
                setupVideoMosaic(data);
                buildTable(data, ['CLIENTE', 'CANAL', 'URL_ENDPOINT', 'ESTATUS'], tableBox);

            } else {
                // Fallback generico para los demas modulos
                const keys = Object.keys(data[0] || {});
                kpiBox.innerHTML = `
                    ${buildKPI('Registros', data.length, 'database', 'text-main', 'Total de filas')}
                    ${buildKPI('Columnas Detectadas', keys.length, 'columns', 'text-main', 'Mapeadas')}
                `;
                buildTable(data, keys.slice(0, 5), tableBox); // Mostrar primeras 5 columnas
            }
        }

        // Helpers de Construcción HTML
        function buildKPI(title, val, icon, colorClass, sub) {
            return `<div class="card"><div class="kpi-title"><i data-lucide="${icon}"></i> ${title}</div><div class="kpi-value ${colorClass}">${val}</div><div class="kpi-sub">${sub}</div></div>`;
        }

        function buildChartBox(id, title, container, fullWidth = false) {
            const div = document.createElement('div');
            div.className = 'chart-box';
            if (fullWidth) div.style.gridColumn = '1 / -1';
            div.innerHTML = `<div class="kpi-title">${title}</div><div id="${id}" style="height: 250px;"></div>`;
            container.appendChild(div);
        }

        function buildTable(data, columns, container) {
            if(columns.length===0) return;
            let html = `<table><thead><tr>`;
            columns.forEach(c => html += `<th>${c}</th>`);
            html += `</tr></thead><tbody>`;
            data.slice(0, 50).forEach(row => {
                html += `<tr>`;
                columns.forEach(c => html += `<td>${row[c] || '-'}</td>`);
                html += `</tr>`;
            });
            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        // Helpers de Gráficos (Plotly)
        function plotBar(elementId, data, column) {
            const counts = {};
            data.forEach(r => { let k = r[column]||'S/D'; counts[k] = (counts[k]||0)+1; });
            Plotly.newPlot(elementId, [{ x: Object.keys(counts), y: Object.values(counts), type: 'bar', marker:{color: '#0ea5e9'} }], { paper_bgcolor: 'transparent', plot_bgcolor: 'transparent', margin:{t:10, b:40, l:30, r:10}, font:{color:'#94a3b8', size:10}, xaxis:{gridcolor:'#334155'}, yaxis:{gridcolor:'#334155'} }, {displayModeBar: false});
        }

        function plotPie(elementId, data, column) {
            const counts = {};
            data.forEach(r => { let k = r[column]||'S/D'; counts[k] = (counts[k]||0)+1; });
            Plotly.newPlot(elementId, [{ labels: Object.keys(counts), values: Object.values(counts), type: 'pie', hole: 0.4, marker:{colors:['#0ea5e9','#8b5cf6','#10b981','#f59e0b']} }], { paper_bgcolor: 'transparent', plot_bgcolor: 'transparent', margin:{t:10, b:10, l:10, r:10}, font:{color:'#94a3b8', size:10}, showlegend:true }, {displayModeBar: false});
        }

        function plotGaugeBar(elementId, data, labelCol, valCol) {
            const x = data.map(r => r[labelCol]);
            const y = data.map(r => parseFloat(r[valCol]) || 0);
            Plotly.newPlot(elementId, [{ x: x, y: y, type: 'bar', marker:{color: y.map(v => v >= 100 ? '#22c55e' : (v >= 80 ? '#eab308' : '#ef4444'))} }], { paper_bgcolor: 'transparent', plot_bgcolor: 'transparent', margin:{t:10, b:80, l:40, r:10}, font:{color:'#94a3b8', size:10}, xaxis:{tickangle: -45}, yaxis:{gridcolor:'#334155'} }, {displayModeBar: false});
        }

        // Módulo de Video
        function setupVideoMosaic(data) {
            const grid = document.getElementById('video-grid');
            // Filtrar filas que tengan un m3u8
            const streams = data.filter(r => (r['URL_ENDPOINT']||'').includes('.m3u8')).slice(0,3);
            
            // Fallback demo si no hay streams en el CSV
            if(streams.length === 0) {
                for(let i=1; i<=3; i++) streams.push({ 'CANAL': `Demo Stream ${i}`, 'URL_ENDPOINT': 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8' });
            }

            streams.forEach((s, i) => {
                grid.innerHTML += `<div class="v-slot"><video id="vid-${i}" controls muted autoplay></video><div class="v-label">${s['CANAL']}</div></div>`;
            });

            setTimeout(() => {
                streams.forEach((s, i) => {
                    const vid = document.getElementById(`vid-${i}`);
                    if (Hls.isSupported()) {
                        const hls = new Hls({enableWorker: true});
                        hls.loadSource(s['URL_ENDPOINT']);
                        hls.attachMedia(vid);
                        appState.players.push(hls);
                    } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
                        vid.src = s['URL_ENDPOINT'];
                    }
                });
            }, 100);
        }

        /**
         * ==========================================
         * 6. DATOS DEMO (Solo si la URL está vacía)
         * ==========================================
         */
        function generateMockData(modId) {
            if(modId === 'construccion') return [
                {'ID UFINET': 'UF-001', 'PROYECTO': 'Despliegue FTTH Centro', 'PAIS': 'GTM', 'ETAPA': 'Construcción', 'AVANCE REAL.': '45', 'RIESGO': 'Bajo'},
                {'ID UFINET': 'UF-002', 'PROYECTO': 'Enlace Backbone', 'PAIS': 'SLV', 'ETAPA': 'Planificación', 'AVANCE REAL.': '10', 'RIESGO': 'Alto'}
            ];
            if(modId === 'objetivos') return [
                {'OBJETIVO': 'Expansión Red', 'META': '1000km', 'REAL': '850', '% CUMPLIMIENTO': '85', 'PESO': '30%'},
                {'OBJETIVO': 'Renovación Licencias', 'META': '100%', 'REAL': '100%', '% CUMPLIMIENTO': '100', 'PESO': '15%'}
            ];
            if(modId === 'ventas') return [
                {'CLIENTE': 'ISP Alpha', 'PRODUCTO': 'Tránsito IP 10G', 'VALOR': '15000', 'ESTADO': 'Instalado', 'FECHA DE INSTALACION': '2026-03-15'},
                {'CLIENTE': 'Telco Beta', 'PRODUCTO': 'Enlace L2', 'VALOR': '8500', 'ESTADO': 'Pendiente', 'FECHA DE INSTALACION': '2026-05-01'}
            ];
            // ... Mock genérico para otros
            return Array.from({length: 10}, (_,i) => ({'ID': i, 'Dato': `Mock ${modId} ${i}`, 'Estado': 'Ok'}));
        }

        // Iniciar
        window.onload = initApp;
    </script>
</body>
</html>
