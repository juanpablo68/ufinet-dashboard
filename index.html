<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UFINET | BI Command Center v3</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg-dark: #0f172a; --card-bg: #1e293b; --accent-blue: #0ea5e9;
            --accent-purple: #8b5cf6; --text-main: #f8fafc; --text-dim: #94a3b8;
            --border: #334155; --success: #22c55e; --warning: #f59e0b; --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        aside { width: 280px; background: var(--card-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100%; }
        .logo { padding: 25px; font-weight: 800; font-size: 1.3rem; color: var(--accent-blue); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
        .menu-list { flex: 1; overflow-y: auto; padding: 15px 10px; display: flex; flex-direction: column; gap: 4px; }
        .menu-item {
            padding: 12px 15px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px;
            color: var(--text-dim); font-size: 0.85rem; font-weight: 600; transition: 0.2s;
        }
        .menu-item:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }
        .menu-item.active { background: var(--accent-blue); color: var(--bg-dark); }
        
        /* Main Workspace */
        main { flex: 1; display: flex; flex-direction: column; height: 100%; overflow-y: auto; padding: 30px; }
        header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; }
        .sync-badge { padding: 6px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid var(--success); display: flex; align-items: center; gap: 6px; }

        /* Dashboard Elements */
        .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 20px; border-radius: 12px; }
        .kpi-label { color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .kpi-value { font-size: 2rem; font-weight: 800; line-height: 1; }
        
        .content-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; margin-bottom: 25px; }
        .visual-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; min-height: 350px; }
        
        .table-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; overflow-x: auto; grid-column: 1 / -1; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid var(--border); color: var(--text-dim); text-transform: uppercase; font-size: 0.7rem; }
        td { padding: 12px; border-bottom: 1px solid var(--border); color: #e2e8f0; }
        tr:hover { background: rgba(255,255,255,0.02); }

        /* Mosaico Video */
        #video-mosaic { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .v-slot { background: #000; border-radius: 8px; overflow: hidden; aspect-ratio: 16/9; position: relative; border: 1px solid var(--border); }
        video { width: 100%; height: 100%; object-fit: cover; }
        .v-tag { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.8); padding: 4px 8px; border-radius: 4px; font-size: 0.6rem; font-weight: 700; }

        #loader { position: fixed; inset: 0; background: var(--bg-dark); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
        .spinner { width: 40px; height: 40px; border: 4px solid #1e293b; border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="color: var(--text-dim); font-weight: 600;">Sincronizando Capas BI Normalizadas...</p>
    </div>

    <aside>
        <div class="logo"><i data-lucide="shield-check"></i> UFINET BI</div>
        <div class="menu-list" id="menu-container"></div>
        <div style="padding: 15px; border-top: 1px solid var(--border);">
            <select id="filter-pais" style="width: 100%; padding: 10px; background: var(--bg-dark); color: white; border: 1px solid var(--border); border-radius: 8px; font-size: 0.8rem;">
                <option value="all">Todos los Países</option>
            </select>
        </div>
    </aside>

    <main>
        <header>
            <div>
                <h1 id="view-title">Dashboard Operativo</h1>
                <p id="view-desc" style="color: var(--text-dim); font-size: 0.85rem;"></p>
            </div>
            <div class="sync-badge"><i data-lucide="refresh-cw" size="14"></i> Live Normalizado</div>
        </header>

        <section class="kpi-row" id="kpi-container"></section>
        
        <section class="content-grid" id="main-content">
            <div class="visual-box" id="viz-primary"></div>
            <div class="visual-box" id="viz-secondary"></div>
        </section>

        <section class="table-box" id="table-wrap"></section>
    </main>

    <script>
        /**
         * CONFIGURACIÓN DE RUTAS BI_NORMALIZADAS
         */
        const BI_CONFIG = {
            proyectos: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQl5O06JTVpGr61abJYmZR5XbP7XTYyQEA1T-pSIhEN74E9_mlw0kO0UeynA9-yMg/pub?gid=1978252277&single=true&output=csv', // URL BI_Master_Proyectos
            objetivos: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQl5O06JTVpGr61abJYmZR5XbP7XTYyQEA1T-pSIhEN74E9_mlw0kO0UeynA9-yMg/pub?gid=323797500&single=true&output=csv',  // URL BI_Objetivos
            ventas: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQl5O06JTVpGr61abJYmZR5XbP7XTYyQEA1T-pSIhEN74E9_mlw0kO0UeynA9-yMg/pub?gid=435948927&single=true&output=csv',     // URL BI_Ventas
            grilla: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQl5O06JTVpGr61abJYmZR5XbP7XTYyQEA1T-pSIhEN74E9_mlw0kO0UeynA9-yMg/pub?gid=1510427807&single=true&output=csv',   // URL BI_Grilla_Canales
            towering: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQl5O06JTVpGr61abJYmZR5XbP7XTYyQEA1T-pSIhEN74E9_mlw0kO0UeynA9-yMg/pub?gid=1874251296&single=true&output=csv' // URL BI_Instalaciones_Towering
        };

        const MODULES = [
            { id: 'proyectos', name: 'Master Construcción', icon: 'hard-hat', desc: 'Control de despliegue y CAPEX.' },
            { id: 'objetivos', name: 'Objetivos del Área', icon: 'target', desc: 'Cumplimiento de metas ejecutivas.' },
            { id: 'ventas', name: 'Ventas e Instalación', icon: 'dollar-sign', desc: 'Monitoreo de funnel y entregas.' },
            { id: 'grilla', name: 'Grilla & Monitoreo', icon: 'tv', desc: 'Disponibilidad de señales y mosaico.' },
            { id: 'towering', name: 'Towering / Sitios', icon: 'radio-tower', desc: 'Gestión de infraestructura de torre.' }
        ];

        let appData = {};
        let activeModule = 'proyectos';
        let hlsPlayers = [];

        async function init() {
            renderMenu();
            const fetchPromises = Object.keys(BI_CONFIG).map(key => {
                return new Promise(resolve => {
                    Papa.parse(BI_CONFIG[key], {
                        download: true, header: true, skipEmptyLines: true,
                        complete: res => { appData[key] = res.data; resolve(); },
                        error: () => { appData[key] = []; resolve(); }
                    });
                });
            });

            await Promise.all(fetchPromises);
            document.getElementById('loader').style.display = 'none';
            updatePaisFilter();
            switchModule('proyectos');
            lucide.createIcons();
        }

        function renderMenu() {
            const container = document.getElementById('menu-container');
            MODULES.forEach(m => {
                const item = document.createElement('div');
                item.className = `menu-item ${m.id === activeModule ? 'active' : ''}`;
                item.id = `btn-${m.id}`;
                item.innerHTML = `<i data-lucide="${m.icon}"></i> ${m.name}`;
                item.onclick = () => switchModule(m.id);
                container.appendChild(item);
            });
        }

        function switchModule(id) {
            activeModule = id;
            document.querySelectorAll('.menu-item').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${id}`).classList.add('active');
            
            const mod = MODULES.find(m => m.id === id);
            document.getElementById('view-title').innerText = mod.name;
            document.getElementById('view-desc').innerText = mod.desc;

            // Cleanup videos
            hlsPlayers.forEach(p => p.destroy());
            hlsPlayers = [];

            renderDashboard();
        }

        function renderDashboard() {
            const data = filterByPais(appData[activeModule]);
            const kpiWrap = document.getElementById('kpi-container');
            const tableWrap = document.getElementById('table-wrap');
            const viz1 = document.getElementById('viz-primary');
            const viz2 = document.getElementById('viz-secondary');

            kpiWrap.innerHTML = '';
            tableWrap.innerHTML = '';
            viz1.innerHTML = '';
            viz2.innerHTML = '';

            const cleanN = (v) => parseFloat(v?.toString().replace(/[^0-9.-]+/g,"")) || 0;

            if (activeModule === 'proyectos') {
                const total = data.length;
                const avgReal = data.reduce((a,b) => a + cleanN(b['AVANCE REAL.']), 0) / (total || 1);
                const riesgo = data.filter(r => r['RIESGO DE ATRASO'] === 'Alto').length;

                kpiWrap.innerHTML = buildKPI('Proyectos', total, 'layers', 'accent-blue') +
                                  buildKPI('Avance Medio', avgReal.toFixed(1)+'%', 'activity', avgReal > 80 ? 'success' : 'warning') +
                                  buildKPI('Riesgo Alto', riesgo, 'alert-triangle', 'danger');

                renderChart('viz-primary', data, 'PROYECTO', 'AVANCE REAL.', 'bar', 'Avance por Proyecto');
                renderChart('viz-secondary', data, 'ETAPA', null, 'pie', 'Distribución por Etapa');
                renderTable(data, ['ID UFINET', 'PROYECTO', 'PAIS', 'ETAPA', 'AVANCE REAL.', 'RIESGO DE ATRASO'], tableWrap);

            } else if (activeModule === 'objetivos') {
                const cumpli = data.reduce((a,b) => a + cleanN(b['% CUMPLIMIENTO']), 0) / (data.length || 1);
                kpiWrap.innerHTML = buildKPI('Objetivos', data.length, 'target', 'accent-purple') +
                                  buildKPI('Cumplimiento', cumpli.toFixed(1)+'%', 'trending-up', 'success');

                renderChart('viz-primary', data, 'OBJETIVO', '% CUMPLIMIENTO', 'bar', '% Cumplimiento por KPI');
                renderTable(data, ['OBJETIVO', 'META', 'REAL', '% CUMPLIMIENTO', 'PESO'], tableWrap);

            } else if (activeModule === 'grilla') {
                kpiWrap.innerHTML = buildKPI('Canales', data.length, 'tv', 'accent-blue') +
                                  buildKPI('Estatus', '99.9%', 'check-circle', 'success');
                
                viz1.style.gridColumn = '1 / -1';
                viz1.innerHTML = '<div class="kpi-label"><i data-lucide="monitor-play"></i> Mosaico en Tiempo Real</div><div id="video-mosaic"></div>';
                setupMosaic(data);
                renderTable(data, ['CLIENTE', 'CANAL', 'PAIS', 'ESTATUS'], tableWrap);
            }
            lucide.createIcons();
        }

        function buildKPI(label, val, icon, color) {
            return `<div class="card"><div class="kpi-label"><i data-lucide="${icon}"></i> ${label}</div><div class="kpi-value" style="color:var(--${color})">${val}</div></div>`;
        }

        function renderChart(id, data, labelCol, valCol, type, title) {
            const el = document.getElementById(id);
            if(type === 'bar') {
                const labels = data.map(r => r[labelCol]);
                const values = data.map(r => parseFloat(r[valCol]) || 0);
                Plotly.newPlot(id, [{ x: labels, y: values, type: 'bar', marker: {color: '#0ea5e9'} }], 
                { title, paper_bgcolor: 'transparent', plot_bgcolor: 'transparent', font: {color: '#94a3b8', size: 10}, margin: {t:40, b:40, l:40, r:10} }, {displayModeBar: false});
            } else {
                const counts = {};
                data.forEach(r => { let k = r[labelCol] || 'S/D'; counts[k] = (counts[k] || 0) + 1; });
                Plotly.newPlot(id, [{ labels: Object.keys(counts), values: Object.values(counts), type: 'pie', hole: .4 }], 
                { title, paper_bgcolor: 'transparent', font: {color: '#94a3b8', size: 10}, margin: {t:40, b:10, l:10, r:10}, showlegend: false }, {displayModeBar: false});
            }
        }

        function renderTable(data, cols, container) {
            let html = `<table><thead><tr>`;
            cols.forEach(c => html += `<th>${c}</th>`);
            html += `</tr></thead><tbody>`;
            data.slice(0, 30).forEach(r => {
                html += `<tr>`;
                cols.forEach(c => html += `<td>${r[c] || '-'}</td>`);
                html += `</tr>`;
            });
            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        function setupMosaic(data) {
            const container = document.getElementById('video-mosaic');
            const streams = data.filter(r => r['URL_ENDPOINT']?.includes('.m3u8')).slice(0, 6);
            
            streams.forEach((s, i) => {
                const id = `vid-${i}`;
                container.innerHTML += `<div class="v-slot"><video id="${id}" muted autoplay controls></video><div class="v-tag">${s['CANAL']}</div></div>`;
                setTimeout(() => {
                    const video = document.getElementById(id);
                    if (Hls.isSupported()) {
                        const hls = new Hls();
                        hls.loadSource(s['URL_ENDPOINT']);
                        hls.attachMedia(video);
                        hlsPlayers.push(hls);
                    }
                }, 100);
            });
        }

        function updatePaisFilter() {
            const paises = [...new Set(appData.proyectos.map(r => r.PAIS).filter(Boolean))].sort();
            const select = document.getElementById('filter-pais');
            paises.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p; opt.innerText = p;
                select.appendChild(opt);
            });
            select.onchange = () => renderDashboard();
        }

        function filterByPais(data) {
            const pais = document.getElementById('filter-pais').value;
            if (pais === 'all') return data;
            return data.filter(r => r.PAIS === pais);
        }

        window.onload = init;
    </script>
</body>
</html>
